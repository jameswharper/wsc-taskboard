<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSC Task Board — Harper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe9;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text2: #5a5a55;
    --text3: #9a9a93;
    --accent: #1D9E75;
    --sans: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --serif: 'Playfair Display', serif;
    --radius: 10px;
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.11);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.035) 1px, transparent 1px);
    background-size: 24px 24px; pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .header h1 { font-family: var(--serif); font-size: 34px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
  .header .sub { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 5px; letter-spacing: 0.07em; }
  .header-right { display: flex; gap: 8px; align-items: center; }

  .btn { font-family: var(--sans); font-size: 13px; font-weight: 600; border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary { background: var(--text); color: #fff; }
  .btn-primary:hover { opacity: 0.82; }
  .btn-ghost { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); font-size: 12px; font-family: var(--mono); }
  .btn-ghost:hover { color: var(--text); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
  .tab { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.06em; padding: 8px 20px; cursor: pointer; border: none; background: transparent; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* Progress */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-meta span { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .progress-track { height: 5px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* Filters */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pill { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 5px 13px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all 0.12s; }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--text); color: #fff; border-color: var(--text); }
  .pill.active.f-Admin    { background:#E6F1FB;color:#042C53;border-color:#B5D4F4; }
  .pill.active.f-Planning { background:#EEEDFE;color:#26215C;border-color:#CECBF6; }
  .pill.active.f-Marking  { background:#FAECE7;color:#4A1B0C;border-color:#F5C4B3; }
  .pill.active.f-Resources{ background:#EAF3DE;color:#173404;border-color:#C0DD97; }
  .pill.active.f-Y11      { background:#FAEEDA;color:#412402;border-color:#FAC775; }
  .pill.active.f-NEA      { background:#FBEAF0;color:#4B1528;border-color:#F4C0D1; }

  /* Add row */
  .add-row { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.25rem; display: none; }
  .add-row.open { display: block; }
  .add-row-inner { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .add-row input[type="text"] { flex:1; min-width:200px; font-family:var(--sans); font-size:14px; color:var(--text); background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px 12px; outline:none; transition:border-color 0.15s; }
  .add-row input:focus { border-color: var(--accent); }
  .add-row select, .add-row input[type="date"] { font-family:var(--mono); font-size:11px; color:var(--text); background:var(--surface2); border:1px solid var(--border2); border-radius:7px; padding:8px 10px; outline:none; cursor:pointer; }

  /* Columns */
  .cols { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
  @media(max-width:680px){ .cols { grid-template-columns:1fr; } }

  .col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; padding:0 2px; }
  .col-label { font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; }
  .col-count { font-family:var(--mono); font-size:11px; color:var(--text3); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1px 9px; }

  .col-zone { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:8px; min-height:140px; display:flex; flex-direction:column; gap:7px; transition:background 0.15s, border-color 0.15s; }
  .col-zone.drag-over { background:#e8f5f0; border-color:var(--accent); }

  .col-empty { text-align:center; padding:28px 10px; color:var(--text3); font-family:var(--mono); font-size:11px; font-style:italic; }

  /* Cards */
  .task-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 11px; cursor:grab; transition:transform 0.15s, box-shadow 0.15s; position:relative; }
  .task-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); }
  .task-card:active { cursor:grabbing; }
  .task-card.dragging { opacity:0.35; transform:scale(0.95); }
  .task-card.high-priority { border-left:3px solid #e11d48; }

  .task-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; margin-bottom:8px; }
  .task-text { font-size:13px; line-height:1.45; color:var(--text); flex:1; }
  .task-delete { background:transparent; border:none; color:var(--text3); font-size:15px; cursor:pointer; padding:0 1px; line-height:1; flex-shrink:0; opacity:0; transition:opacity 0.12s; }
  .task-card:hover .task-delete { opacity:1; }
  .task-delete:hover { color:#e11d48; }

  .task-bottom { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:5px; }
  .task-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }

  .tag-badge { font-family:var(--mono); font-size:10px; font-weight:500; border-radius:20px; padding:2px 8px; }
  .tb-Admin    {background:#E6F1FB;color:#042C53;}
  .tb-Planning {background:#EEEDFE;color:#26215C;}
  .tb-Marking  {background:#FAECE7;color:#4A1B0C;}
  .tb-Resources{background:#EAF3DE;color:#173404;}
  .tb-Y11      {background:#FAEEDA;color:#412402;}
  .tb-NEA      {background:#FBEAF0;color:#4B1528;}

  .deadline-badge { font-family:var(--mono); font-size:10px; color:#b45309; }
  .priority-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#e11d48; margin-right:4px; vertical-align:middle; flex-shrink:0; }

  .task-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.12s; }
  .task-card:hover .task-actions { opacity:1; }
  .btn-move { font-family:var(--mono); font-size:10px; font-weight:500; border:none; border-radius:5px; padding:3px 8px; cursor:pointer; }

  /* Events tab */
  .events-list { display:flex; flex-direction:column; gap:8px; }
  .event-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; display:flex; align-items:center; gap:14px; }
  .event-date-block { text-align:center; min-width:44px; }
  .event-day { font-family:var(--serif); font-size:22px; font-weight:700; line-height:1; color:var(--text); }
  .event-month { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; }
  .event-info { flex:1; }
  .event-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:3px; }
  .event-meta { font-family:var(--mono); font-size:11px; color:var(--text3); }

  /* Status */
  .status-bar { font-family:var(--mono); font-size:11px; color:var(--text3); text-align:right; margin-bottom:10px; height:16px; }
  .status-bar.err { color:#e11d48; }

  /* Loading */
  .loading { text-align:center; padding:3rem; font-family:var(--mono); font-size:12px; color:var(--text3); }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:20px; height:20px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
  .task-card { animation:fadeIn 0.2s ease; }

  /* Confetti */
  @keyframes confettiBurst { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}100%{opacity:0;transform:translateY(-110px) rotate(720deg) scale(0);} }
  .confetti-p { position:fixed; pointer-events:none; z-index:9999; animation:confettiBurst 1.1s ease-out forwards; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <h1>WSC Board</h1>
      <div class="sub">WEST SOMERSET COLLEGE &nbsp;·&nbsp; J. HARPER</div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" onclick="loadAll()">↻ Refresh</button>
      <button class="btn btn-primary" id="add-btn" onclick="toggleAdd()">+ Add task</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks')">Tasks</button>
    <button class="tab" onclick="switchTab('events')">Calendar events</button>
  </div>

  <div class="status-bar" id="status"></div>

  <!-- TASKS TAB -->
  <div id="tasks-tab">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progress-label">Loading...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div class="filter-row" id="filter-row"></div>

    <div class="add-row" id="add-row">
      <div class="add-row-inner">
        <input type="text" id="new-text" placeholder="Task description..." onkeydown="if(event.key==='Enter')commitAdd()">
        <select id="new-tag">
          <option>Admin</option><option>Planning</option><option>Marking</option>
          <option>Resources</option><option>Y11</option><option>NEA</option>
        </select>
        <select id="new-priority">
          <option value="normal">Normal</option>
          <option value="high">High priority</option>
        </select>
        <input type="date" id="new-deadline" title="Deadline (optional)">
        <button class="btn btn-primary" style="padding:8px 14px;font-size:12px;" onclick="commitAdd()">Add</button>
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:18px;line-height:1;" onclick="toggleAdd()">×</button>
      </div>
    </div>

    <div id="tasks-loading" class="loading"><div class="spinner"></div>Loading tasks from Google Sheets...</div>
    <div class="cols" id="cols-grid" style="display:none"></div>
  </div>

  <!-- EVENTS TAB -->
  <div id="events-tab" style="display:none">
    <div id="events-loading" class="loading"><div class="spinner"></div>Loading events...</div>
    <div class="events-list" id="events-list" style="display:none"></div>
  </div>

</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz6RiOkXv0WTb5cCFpVH5sW5ttec2YIW5_bYecU5PyC5tJLYzF6QtOHUxw5OFNyd2QL/exec';

let tasks = [];
let events = [];
let filter = 'All';
let dragId = null;
let currentTab = 'tasks';
let addOpen = false;

const TAGS = ['All','Admin','Planning','Marking','Resources','Y11','NEA'];
const COLS_DEF = [
  {id:'todo',  label:'To do',       color:'#64748b'},
  {id:'doing', label:'In progress', color:'#b45309'},
  {id:'done',  label:'Done',        color:'#15803d'},
];

// ── API calls ──────────────────────────────────────────────────────────────

async function api(params) {
  const url = API + '?' + new URLSearchParams(params).toString();
  const r = await fetch(url);
  return r.json();
}

async function loadAll() {
  setStatus('Syncing...');
  try {
    const [tr, er] = await Promise.all([
      api({action:'getTasks'}),
      api({action:'getEvents'})
    ]);
    if (tr.ok) {
      tasks = parseTasks(tr.data);
      document.getElementById('tasks-loading').style.display = 'none';
      document.getElementById('cols-grid').style.display = 'grid';
      renderTasks();
    }
    if (er.ok) {
      events = parseEvents(er.data);
      document.getElementById('events-loading').style.display = 'none';
      document.getElementById('events-list').style.display = 'flex';
      renderEvents();
    }
    setStatus('Last synced ' + new Date().toLocaleTimeString('en-GB'));
  } catch(e) {
    setStatus('Could not reach Google Sheets — check connection', true);
  }
}

function parseTasks(data) {
  if (!data || data.length < 2) return [];
  return data.slice(1).map(r => ({
    id: String(r[0]), text: r[1], tag: r[2], priority: r[3],
    deadline: r[4], col: r[5]
  })).filter(t => t.text);
}

function parseEvents(data) {
  if (!data || data.length < 2) return [];
  return data.slice(1).map(r => ({
    id: String(r[0]), title: r[1], date: r[2], time: r[3],
    endDate: r[4], location: r[5]
  })).filter(e => e.title);
}

// ── Render tasks ───────────────────────────────────────────────────────────

function renderTasks() {
  renderFilters();
  renderCols();
  renderProgress();
}

function renderProgress() {
  const done = tasks.filter(t=>t.col==='done').length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  document.getElementById('progress-label').textContent = `${done} of ${tasks.length} tasks complete`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = '';
  TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (filter===tag ? ' active f-'+tag : '');
    btn.textContent = tag;
    btn.onclick = () => { filter = tag; renderTasks(); };
    row.appendChild(btn);
  });
}

function renderCols() {
  const grid = document.getElementById('cols-grid');
  grid.innerHTML = '';
  COLS_DEF.forEach(col => {
    const visible = tasks.filter(t => t.col===col.id && (filter==='All'||t.tag===filter));
    const wrap = document.createElement('div');

    const header = document.createElement('div');
    header.className = 'col-header';
    header.innerHTML = `<span class="col-label" style="color:${col.color}">${col.label}</span><span class="col-count">${visible.length}</span>`;
    wrap.appendChild(header);

    const zone = document.createElement('div');
    zone.className = 'col-zone';
    zone.dataset.col = col.id;

    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', e => { if(!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', async e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (dragId) {
        const prev = tasks.find(t=>t.id===dragId)?.col;
        tasks = tasks.map(t => t.id===dragId ? {...t, col:col.id} : t);
        renderTasks();
        if (col.id==='done' && prev!=='done') burst();
        dragId = null;
        await api({action:'updateTask', id: tasks.find(t=>t.col===col.id)?.id || dragId, col:col.id});
        // re-find correct id
        setStatus('Saved to Google Sheets ✓');
      }
    });

    if (visible.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'col-empty';
      empty.textContent = col.id==='done' ? 'Nothing done yet!' : col.id==='doing' ? 'Drag tasks here' : 'All clear!';
      zone.appendChild(empty);
    }

    visible.forEach(task => {
      const card = buildCard(task, col);
      zone.appendChild(card);
    });

    wrap.appendChild(zone);
    grid.appendChild(wrap);
  });
}

function buildCard(task, col) {
  const card = document.createElement('div');
  card.className = 'task-card' + (task.priority==='high' ? ' high-priority' : '');
  card.draggable = true;
  card.dataset.id = task.id;

  card.addEventListener('dragstart', () => { dragId = task.id; setTimeout(()=>card.classList.add('dragging'),0); });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  const dl = task.deadline ? `<span class="deadline-badge">by ${formatDate(task.deadline)}</span>` : '';
  const dot = task.priority==='high' ? `<span class="priority-dot"></span>` : '';

  let moveBtns = '';
  if (col.id==='todo')  moveBtns = `<button class="btn-move" style="background:#6366f1;color:#fff;" onclick="move('${task.id}','doing')">Start →</button>`;
  if (col.id==='doing') moveBtns = `<button class="btn-move" style="background:#15803d;color:#fff;" onclick="move('${task.id}','done')">Done ✓</button>`;
  if (col.id==='done')  moveBtns = `<button class="btn-move" style="background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;" onclick="move('${task.id}','todo')">← Undo</button>`;

  card.innerHTML = `
    <div class="task-top">
      <div class="task-text">${dot}${esc(task.text)}</div>
      <button class="task-delete" onclick="del('${task.id}')">×</button>
    </div>
    <div class="task-bottom">
      <div class="task-meta"><span class="tag-badge tb-${task.tag}">${task.tag}</span>${dl}</div>
      <div class="task-actions">${moveBtns}</div>
    </div>`;
  return card;
}

async function move(id, toCol) {
  const prev = tasks.find(t=>t.id===id)?.col;
  tasks = tasks.map(t => t.id===id ? {...t, col:toCol} : t);
  renderTasks();
  if (toCol==='done' && prev!=='done') burst();
  setStatus('Saving...');
  await api({action:'updateTask', id, col:toCol});
  setStatus('Saved ✓');
}

async function del(id) {
  tasks = tasks.filter(t=>t.id!==id);
  renderTasks();
  setStatus('Saving...');
  await api({action:'deleteTask', id});
  setStatus('Deleted ✓');
}

// ── Add task ───────────────────────────────────────────────────────────────

function toggleAdd() {
  addOpen = !addOpen;
  document.getElementById('add-row').classList.toggle('open', addOpen);
  if (addOpen) setTimeout(()=>document.getElementById('new-text').focus(),50);
}

async function commitAdd() {
  const text = document.getElementById('new-text').value.trim();
  if (!text) return;
  const tag = document.getElementById('new-tag').value;
  const priority = document.getElementById('new-priority').value;
  const deadline = document.getElementById('new-deadline').value || '';
  setStatus('Adding...');
  const r = await api({action:'addTask', text, tag, priority, deadline, col:'todo'});
  if (r.ok) {
    tasks.push({id: String(r.id), text, tag, priority, deadline, col:'todo'});
    document.getElementById('new-text').value = '';
    document.getElementById('new-deadline').value = '';
    document.getElementById('add-row').classList.remove('open');
    addOpen = false;
    renderTasks();
    setStatus('Added ✓');
  }
}

// ── Events tab ─────────────────────────────────────────────────────────────

function renderEvents() {
  const list = document.getElementById('events-list');
  list.innerHTML = '';
  if (!events.length) {
    list.innerHTML = '<div class="col-empty" style="padding:2rem;text-align:center;">No events yet — add them via Claude chat</div>';
    return;
  }
  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  sorted.forEach(ev => {
    const d = ev.date ? new Date(ev.date + 'T12:00:00') : null;
    const dayNum = d ? d.getDate() : '—';
    const month = d ? d.toLocaleDateString('en-GB',{month:'short'}).toUpperCase() : '';
    const timeMeta = [ev.time, ev.location].filter(Boolean).join(' · ');
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="event-date-block">
        <div class="event-day">${dayNum}</div>
        <div class="event-month">${month}</div>
      </div>
      <div class="event-info">
        <div class="event-title">${esc(ev.title)}</div>
        ${timeMeta ? `<div class="event-meta">${esc(timeMeta)}</div>` : ''}
      </div>`;
    list.appendChild(card);
  });
}

// ── Tabs ───────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tasks-tab').style.display = tab==='tasks' ? 'block' : 'none';
  document.getElementById('events-tab').style.display = tab==='events' ? 'block' : 'none';
  document.getElementById('add-btn').style.display = tab==='tasks' ? 'inline-block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='tasks')||(i===1&&tab==='events')));
}

// ── Helpers ────────────────────────────────────────────────────────────────

function formatDate(val) {
  if (!val) return '';
  try {
    const d = new Date(val + (val.includes('T') ? '' : 'T12:00:00'));
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  } catch { return val; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(msg, isErr=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar' + (isErr ? ' err' : '');
}

function burst() {
  const colors = ['#e11d48','#d97706','#15803d','#6366f1','#ec4899','#0891b2'];
  for (let i=0;i<12;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-p';
    el.style.cssText = `left:${30+Math.random()*40}%;top:${20+Math.random()*30}%;width:7px;height:7px;
      border-radius:${i%2?'50%':'2px'};background:${colors[i%colors.length]};animation-delay:${i*0.045}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────

loadAll();
</script>
